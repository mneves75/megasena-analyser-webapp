name: CLI Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cli-smoke:
    runs-on: ubuntu-latest
    env:
      CI: "1"
      DATABASE_PATH: "./db/cli-smoke.db"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migration smoke
        run: |
          bun run db:migrate

      - name: Run retention CLIs in dry-run mode
        run: |
          bun run audit:prune -- --days 1 --dry-run
          bun run log:prune -- --days 1 --dry-run
